<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewGen Academy | Ken Live</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #visual-board { position: absolute; width: 100%; height: 100%; background-color: #111; background-size: cover; background-position: center; z-index: 1; transition: background-image 1s ease-in-out; }
        
        #video-layer { position: absolute; width: 100%; height: 100%; z-index: 2; display: none; background: #000; }
        #video-layer iframe { width: 100%; height: 100%; border: none; pointer-events: auto; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 15%, transparent 85%, rgba(0,0,0,0.8) 100%); }
        
        .top-bar { padding: 20px; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        h1 { margin: 0; font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        
        select { background: rgba(0,0,0,0.6); color: white; border: 2px solid white; padding: 10px 15px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; outline: none; }
        
        .bottom-controls { padding: 40px; display: flex; justify-content: center; pointer-events: auto; }
        
        .btn-mic { width: 80px; height: 80px; border-radius: 50%; border: none; background: #4CAF50; color: white; font-size: 2rem; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
        .btn-mic.active { background: #f44336; box-shadow: 0 0 20px #f44336; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0px rgba(244, 67, 54, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(244, 67, 54, 0); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="visual-board" style="background-image: url('https://image.pollinations.ai/prompt/beautiful%20universe%20science?width=1920&height=1080&nologo=true');"></div>
    <div id="video-layer"></div>
    
    <div id="ui">
        <div class="top-bar">
            <h1>NewGen Academy</h1>
            <select id="grade-selector">
                <option value="Grades 1-5">Grades 1-5</option>
                <option value="Grades 6-9">Grades 6-9</option>
                <option value="Grades 10-12">Grades 10-12</option>
                <option value="Honors">Honors</option>
                <option value="Masters">Masters</option>
                <option value="Ph.D">Ph.D</option>
            </select>
        </div>
        <div class="bottom-controls">
            <button id="mic" class="btn-mic">🎤</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const WORKER_URL = "https://newgen-brain.newpreviewgen.workers.dev/";
        const YOUTUBE_API_KEY = "PASTE_YOUR_YOUTUBE_API_KEY_HERE"; 

        let isSessionLive = false;
        let recognition;
        let conversationHistory = []; 
        let speechQueue = [];
        let isSpeaking = false;
        
        const micBtn = document.getElementById('mic');
        const gradeSelector = document.getElementById('grade-selector');
        const visualBoard = document.getElementById('visual-board');
        const videoLayer = document.getElementById('video-layer');

        // ==========================================
        // SPEECH RECOGNITION (Listening)
        // ==========================================
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true; 
            
            // Set to Indian English default to allow a mix of English, Hindi, and Bengali accent detection
            recognition.lang = 'en-IN'; 

            recognition.onresult = async (event) => {
                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                    speechQueue = []; // Clear queue on interruption
                    isSpeaking = false;
                }

                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }

                const userSpeech = finalTranscript.trim();
                if (userSpeech) {
                    await askKen(userSpeech);
                }
            };
            
            recognition.onend = () => { if (isSessionLive) recognition.start(); };
        }

        // ==========================================
        // SESSION CONTROL
        // ==========================================
        micBtn.addEventListener('click', () => {
            if (!isSessionLive) {
                isSessionLive = true;
                conversationHistory = []; 
                micBtn.classList.add('active');
                recognition.start();
                queueSpeech("Hi, I am Ken. Feel free to speak to me in English, Hindi, or Bengali. What science topic shall we explore?");
            } else {
                isSessionLive = false;
                micBtn.classList.remove('active');
                recognition.stop();
                window.speechSynthesis.cancel();
                speechQueue = [];
                isSpeaking = false;
                videoLayer.style.display = 'none';
            }
        });

        // ==========================================
        // AI BRAIN CONNECTION (Streaming)
        // ==========================================
        async function askKen(message) {
            const gradeLevel = gradeSelector.value;
            conversationHistory.push({ role: "user", content: message });
            if (conversationHistory.length > 8) conversationHistory = conversationHistory.slice(-8);

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        grade: gradeLevel,
                        messages: conversationHistory
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let sentenceBuffer = "";
                let fullReplyTracker = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const word = data.response;
                                
                                sentenceBuffer += word;
                                fullReplyTracker += word;

                                // 1. Instant Visual Trigger Check
                                if (sentenceBuffer.includes(']')) {
                                    const videoMatch = fullReplyTracker.match(/\[VIDEO:\s*(.*?)\]/i);
                                    const visualMatch = fullReplyTracker.match(/\[VISUAL:\s*(.*?)\]/i);
                                    
                                    if (videoMatch) {
                                        playYouTubeVideo(videoMatch[1] + " science educational animation");
                                        fullReplyTracker = fullReplyTracker.replace(videoMatch[0], ''); // Clear tag so it doesn't trigger twice
                                        sentenceBuffer = sentenceBuffer.replace(videoMatch[0], '');
                                    } else if (visualMatch) {
                                        updateVisualBoard(visualMatch[1] + " science diagram");
                                        fullReplyTracker = fullReplyTracker.replace(visualMatch[0], '');
                                        sentenceBuffer = sentenceBuffer.replace(visualMatch[0], '');
                                    }
                                }

                                // 2. Fluent Sentence Chunking (Splits on English, Hindi, and Bengali punctuation)
                                if (/[.?!।]\s/.test(sentenceBuffer) || sentenceBuffer.endsWith('\n')) {
                                    let textToSpeak = sentenceBuffer.replace(/\[.*?\]/g, '').trim();
                                    if (textToSpeak) queueSpeech(textToSpeak);
                                    sentenceBuffer = ""; 
                                }
                            } catch(e) { }
                        }
                    }
                }

                // Leftover words
                let finalSentence = sentenceBuffer.replace(/\[.*?\]/g, '').trim();
                if (finalSentence) queueSpeech(finalSentence);

                conversationHistory.push({ role: "assistant", content: fullReplyTracker.replace(/\[.*?\]/g, '').trim() });

            } catch (error) {
                console.error("Connection error:", error);
            }
        }

        // ==========================================
        // GUARANTEED VISUALIZATION LOGIC
        // ==========================================
        function updateVisualBoard(keyword) {
            videoLayer.style.display = 'none';
            videoLayer.innerHTML = ''; 
            
            // USING POLLINATIONS AI - No API key needed, guarantees a generated image!
            const formattedKeyword = encodeURIComponent(keyword + " highly detailed 3d render educational");
            const newImageUrl = `https://image.pollinations.ai/prompt/${formattedKeyword}?width=1920&height=1080&nologo=true`;
            visualBoard.style.backgroundImage = `url('${newImageUrl}')`;
        }

        async function playYouTubeVideo(query) {
            if (YOUTUBE_API_KEY === "PASTE_YOUR_YOUTUBE_API_KEY_HERE") {
                updateVisualBoard(query); // Fallback to image instantly if no key
                return;
            }

            try {
                const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;
                const response = await fetch(searchUrl);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    const videoId = data.items[0].id.videoId;
                    visualBoard.style.backgroundImage = 'none';
                    videoLayer.style.display = 'block';
                    
                    videoLayer.innerHTML = `
                        <iframe 
                            src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&loop=1&playlist=${videoId}" 
                            allow="autoplay; encrypted-media" 
                            allowfullscreen>
                        </iframe>
                    `;
                } else {
                    updateVisualBoard(query); 
                }
            } catch (error) {
                updateVisualBoard(query); 
            }
        }

        // ==========================================
        // FLUENT TEXT TO SPEECH (Auto-Language Detection)
        // ==========================================
        function queueSpeech(text) {
            if (!isSessionLive || !text) return;
            speechQueue.push(text);
            if (!isSpeaking) playNextInQueue();
        }

        function playNextInQueue() {
            if (speechQueue.length === 0) {
                isSpeaking = false;
                return;
            }
            
            isSpeaking = true;
            const text = speechQueue.shift();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            // DYNAMIC LANGUAGE DETECTION based on characters in the text
            const hasBengali = /[\u0980-\u09FF]/.test(text);
            const hasHindi = /[\u0900-\u097F]/.test(text);
            
            let targetVoice;
            
            if (hasBengali) {
                targetVoice = voices.find(v => v.lang.includes('bn'));
            } else if (hasHindi) {
                targetVoice = voices.find(v => v.lang.includes('hi'));
            } else {
                targetVoice = voices.find(v => v.lang === 'en-GB' || v.lang === 'en-IN' || v.lang === 'en-US');
            }
            
            if (targetVoice) utterance.voice = targetVoice;
            
            utterance.rate = 1.0; 
            utterance.pitch = 0.9;
            
            utterance.onend = () => { playNextInQueue(); };
            utterance.onerror = () => { playNextInQueue(); };
            
            window.speechSynthesis.speak(utterance);
        }
        
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
