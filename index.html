<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewGen Academy | Ken the Science Tutor</title>
    <link rel="icon" href="data:,"> 
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); font-family: sans-serif; user-select: none; }
        
        #svg-container, #image-container, #youtube-container { 
            width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 2; 
            display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); 
        }
        
        #svg-container svg { width: 70%; height: 70%; drop-shadow: 0 0 20px rgba(0, 191, 165, 0.5); }
        #dynamic-image { max-width: 80%; max-height: 80%; border-radius: 20px; box-shadow: 0 0 50px rgba(0, 191, 165, 0.5); object-fit: contain; opacity: 0; transition: opacity 0.5s ease-in; }
        #youtube-iframe { width: 80%; height: 80%; border-radius: 20px; box-shadow: 0 0 50px rgba(220, 38, 38, 0.5); border: none; }
        
        .loading-text { position: absolute; color: #00bfa5; font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; animation: pulse 1.5s infinite; z-index: 1; }
        
        .ui-layer { position: relative; z-index: 10; pointer-events: none; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; }
        .interactive { pointer-events: auto; }
        
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        #mic-btn { cursor: pointer; transition: all 0.1s ease-in-out; }
        #mic-btn:active { transform: scale(0.9); }
        .state-idle { background-color: #22c55e; } 
        .state-recording { background-color: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.8); } 
        .state-processing { background-color: #eab308; opacity: 0.7; pointer-events: none; } 
        .state-speaking { background-color: #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.8); pointer-events: none; } 
    </style>
</head>
<body>

    <div id="svg-container"></div>
    
    <div id="image-container">
        <div class="loading-text">Generating AI Image...</div>
        <img id="dynamic-image" src="" alt="AI Visual" onload="this.style.opacity=1">
    </div>
    
    <div id="youtube-container"><iframe id="youtube-iframe" src="" allowfullscreen></iframe></div>

    <div class="ui-layer p-6">
        <header class="interactive bg-[#0a0a0a] border-b-4 border-[#00bfa5] p-4 rounded-xl shadow-2xl flex justify-between items-center text-[#1e88e5]">
            <h1 class="text-2xl font-bold tracking-widest text-white">NEWGEN ACADEMY <span class="text-sm font-normal text-[#00bfa5]">| SCIENCE</span></h1>
            <div class="flex gap-4">
                <select id="grade-select" class="bg-gray-800 text-white border border-[#00bfa5] rounded p-2 outline-none">
                    <option value="1-5">Grades 1-5</option><option value="6-9">Grades 6-9</option><option value="10-12">Grades 10-12</option>
                </select>
                <select id="lang-select" class="bg-gray-800 text-white border border-[#00bfa5] rounded p-2 outline-none">
                    <option value="en-IN">English</option><option value="bn-IN">Bengali</option><option value="hi-IN">Hindi</option>
                </select>
            </div>
        </header>

        <div id="status-text" class="text-center text-white font-bold tracking-widest text-xl drop-shadow-md mt-4">HOLD SPACEBAR OR BUTTON TO TALK</div> 
        <div id="live-transcript" class="text-center text-gray-300 italic mt-2 drop-shadow-md"></div>

        <div class="flex justify-end pb-4 pr-4">
            <button id="mic-btn" class="interactive state-idle w-24 h-24 rounded-full flex items-center justify-center">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        // --- ✅ CLOUDFLARE WORKER URL ✅ ---
        const CLOUDFLARE_WORKER_URL = "https://newgen-brain.newpreviewgen.workers.dev/";
        
        const svgContainer = document.getElementById('svg-container');
        const imageContainer = document.getElementById('image-container');
        const youtubeContainer = document.getElementById('youtube-container');
        const dynamicImage = document.getElementById('dynamic-image');
        const youtubeIframe = document.getElementById('youtube-iframe');
        const statusText = document.getElementById('status-text');
        const liveTranscriptUI = document.getElementById('live-transcript');

        function renderPrimaryVisual(aiData) {
            svgContainer.style.display = 'none';
            imageContainer.style.display = 'none';
            youtubeContainer.style.display = 'none';
            youtubeIframe.src = ""; 
            
            let vType = (aiData.primary_visual_type || "").toLowerCase();

            if (vType === 'svg') {
                svgContainer.innerHTML = aiData.primary_visual_data; 
                svgContainer.style.display = 'flex';
            } else {
                imageContainer.style.display = 'flex';
                dynamicImage.style.opacity = 0; 
                dynamicImage.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(aiData.primary_visual_data)}?width=1280&height=720&nologo=true`;
            }
        }

        function renderYouTube(youtubeId) {
            svgContainer.style.display = 'none';
            imageContainer.style.display = 'none'; 
            youtubeContainer.style.display = 'flex';
            youtubeIframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1`;
        }

        const micBtn = document.getElementById('mic-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        let recognition = new SpeechRecognition();
        
        recognition.continuous = true; 
        recognition.interimResults = true; 

        let isRecording = false;
        let isInterrupted = false;
        let fullTranscript = "";

        function setUIState(state, errorMsg = "") {
            micBtn.className = 'interactive w-24 h-24 rounded-full flex items-center justify-center';
            if (state === 'idle') { micBtn.classList.add('state-idle'); statusText.innerText = "HOLD SPACEBAR OR BUTTON TO TALK"; }
            if (state === 'recording') { micBtn.classList.add('state-recording'); statusText.innerText = "LISTENING... (Release to send)"; }
            if (state === 'processing') { micBtn.classList.add('state-processing'); statusText.innerText = "KEN IS THINKING..."; }
            if (state === 'speaking') { micBtn.classList.add('state-speaking'); statusText.innerText = "KEN IS EXPLAINING..."; }
            if (state === 'error') { micBtn.classList.add('state-idle'); statusText.innerText = errorMsg; }
        }

        function startWalkieTalkie() {
            if (isRecording || synth.speaking) {
                isInterrupted = true; 
                synth.cancel(); 
            }
            isRecording = true;
            isInterrupted = false; 
            fullTranscript = "";
            liveTranscriptUI.innerText = "";
            setUIState('recording');
            recognition.lang = document.getElementById('lang-select').value;
            try { recognition.start(); } catch(e) {}
        }

        async function stopWalkieTalkie() {
            if (!isRecording) return;
            isRecording = false;
            recognition.stop();
            
            if (fullTranscript.trim().length === 0) {
                setUIState('idle'); 
                return;
            }

            setUIState('processing');

            try {
                const langName = document.getElementById('lang-select').options[document.getElementById('lang-select').selectedIndex].text;
                const response = await fetch(CLOUDFLARE_WORKER_URL, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: fullTranscript, language: langName })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || "Server Error");
                }

                const data = await response.json();
                
                // Extra strong JSON sanitizer for SVG quotes
                let rawString = data.result;
                let start = rawString.indexOf('{');
                let end = rawString.lastIndexOf('}');
                let cleanJsonString = rawString.substring(start, end + 1).replace(/[\u0000-\u001F]+/g, " ");
                const aiData = JSON.parse(cleanJsonString);
                
                renderPrimaryVisual(aiData);
                
                const utterance1 = new SpeechSynthesisUtterance(aiData.explanation);
                utterance1.lang = document.getElementById('lang-select').value;
                
                const utterance2 = new SpeechSynthesisUtterance(aiData.transition_phrase || "Let's watch a video.");
                utterance2.lang = document.getElementById('lang-select').value;

                utterance1.onstart = () => setUIState('speaking');
                
                utterance1.onend = () => {
                    if (!isInterrupted) {
                        if (aiData.youtube_id) renderYouTube(aiData.youtube_id);
                        synth.speak(utterance2);
                    }
                };
                
                utterance2.onend = () => setUIState('idle'); 
                
                synth.speak(utterance1);

            } catch (error) {
                console.error(error);
                setUIState('error', "Error: " + error.message);
                setTimeout(() => setUIState('idle'), 4000);
            }
        }

        recognition.onresult = (event) => {
            let currentText = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                currentText += event.results[i][0].transcript;
            }
            fullTranscript = currentText;
            liveTranscriptUI.innerText = fullTranscript;
        };

        micBtn.addEventListener('mousedown', startWalkieTalkie);
        window.addEventListener('mouseup', stopWalkieTalkie);
        micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startWalkieTalkie(); });
        window.addEventListener('touchend', stopWalkieTalkie);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space' && !e.repeat) startWalkieTalkie(); });
        window.addEventListener('keyup', (e) => { if (e.code === 'Space') stopWalkieTalkie(); });
    </script>
</body>
</html>
