<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewGen Academy</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: white; overflow: hidden; }
        #visual-board { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; background-size: cover; background-position: center; background-image: url('https://images.unsplash.com/photo-1507413245164-6160d8298b31?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80'); transition: background-image 1s ease-in-out; z-index: 1; display: flex; justify-content: center; align-items: center; }
        #video-container { width: 100%; height: 100%; display: none; }
        #video-container iframe { width: 100%; height: 100%; border: none; pointer-events: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); pointer-events: auto; gap: 15px; }
        h1 { margin: 0; font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); flex-grow: 1; }
        select { padding: 10px 15px; font-size: 1.1rem; border-radius: 8px; border: 2px solid white; background: rgba(0,0,0,0.6); color: white; cursor: pointer; outline: none; }
        .controls { padding: 40px; display: flex; justify-content: center; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); pointer-events: auto; }
        #mic-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background-color: #4CAF50; color: white; font-size: 2rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; }
        #mic-btn.active { background-color: #f44336; box-shadow: 0 0 20px #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="visual-board">
        <div id="video-container"></div>
    </div>

    <div id="ui-layer">
        <div class="header">
            <h1>NewGen Academy</h1>
            <select id="language-selector">
                <option value="en-IN">English</option>
                <option value="bn-IN">Bengali</option>
                <option value="hi-IN">Hindi</option>
            </select>
            <select id="grade-selector">
                <option value="Grades 1-5">Grades 1-5</option>
                <option value="Grades 6-9">Grades 6-9</option>
                <option value="Grades 10-12">Grades 10-12</option>
                <option value="Honors">Honors</option>
                <option value="Masters">Masters</option>
                <option value="Ph.D">Ph.D</option>
            </select>
        </div>
        <div class="controls">
            <button id="mic-btn">🎤</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const WORKER_URL = "https://newgen-brain.newpreviewgen.workers.dev/";
        const YOUTUBE_API_KEY = "PASTE_YOUR_YOUTUBE_API_KEY_HERE"; 

        // State Variables
        let isSessionLive = false;
        let recognition;
        let conversationHistory = []; 
        let isKenSpeaking = false;
        
        // UI Elements
        const micBtn = document.getElementById('mic-btn');
        const gradeSelector = document.getElementById('grade-selector');
        const languageSelector = document.getElementById('language-selector');
        const visualBoard = document.getElementById('visual-board');
        const videoContainer = document.getElementById('video-container');

        // ==========================================
        // SPEECH RECOGNITION 
        // ==========================================
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true; 
            recognition.lang = languageSelector.value;

            languageSelector.addEventListener('change', () => {
                recognition.lang = languageSelector.value;
                if (isSessionLive) recognition.stop(); 
            });

            recognition.onresult = async (event) => {
                // If the user starts talking, INSTANTLY shut Ken up so he can listen.
                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                }

                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }

                const userSpeech = finalTranscript.trim();
                if (userSpeech) {
                    await askKen(userSpeech);
                }
            };
            
            recognition.onend = () => {
                if (isSessionLive) recognition.start();
            };
        } else {
            alert("Your browser does not support real-time voice. Please use Google Chrome.");
        }

        micBtn.addEventListener('click', () => {
            if (!isSessionLive) {
                isSessionLive = true;
                conversationHistory = []; 
                micBtn.classList.add('active');
                recognition.start();
                
                const langName = languageSelector.options[languageSelector.selectedIndex].text;
                let greeting = "Session started. Hi, I am Ken. What science topic shall we explore?";
                if (langName === "Bengali") greeting = "সেশন শুরু হয়েছে। নমস্কার, আমি কেন। আজ আমরা বিজ্ঞানের কোন বিষয় নিয়ে আলোচনা করব?";
                if (langName === "Hindi") greeting = "सत्र शुरू हो गया है। नमस्ते, मैं केन हूँ। आज हम विज्ञान के किस विषय पर चर्चा करेंगे?";
                
                queueSpeech(greeting);
            } else {
                isSessionLive = false;
                micBtn.classList.remove('active');
                recognition.stop();
                window.speechSynthesis.cancel();
            }
        });

        // ==========================================
        // STREAMING API COMMUNICATION
        // ==========================================
        async function askKen(message) {
            const gradeLevel = gradeSelector.value;
            const selectedLanguage = languageSelector.options[languageSelector.selectedIndex].text;

            conversationHistory.push({ role: "user", content: message });
            if (conversationHistory.length > 10) conversationHistory = conversationHistory.slice(-10);

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        grade: gradeLevel,
                        language: selectedLanguage,
                        messages: conversationHistory
                    })
                });

                // Parse the Server-Sent Events (SSE) Stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let sentenceBuffer = "";
                let fullReplyTracker = "";
                let visualTriggered = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const word = data.response;
                                
                                sentenceBuffer += word;
                                fullReplyTracker += word;

                                // Instantly check for visual/video tags as the stream comes in
                                if (!visualTriggered && sentenceBuffer.includes(']')) {
                                    const visualMatch = fullReplyTracker.match(/\[VISUAL:\s*(.*?)\]/i);
                                    const videoMatch = fullReplyTracker.match(/\[VIDEO:\s*(.*?)\]/i);
                                    
                                    if (videoMatch) {
                                        playYouTubeVideo(videoMatch[1] + " science educational animation");
                                        visualTriggered = true;
                                    } else if (visualMatch) {
                                        updateVisualBoard(visualMatch[1] + " science diagram");
                                        visualTriggered = true;
                                    }
                                }

                                // If the stream hits a punctuation mark, speak the sentence immediately
                                // This regex handles English (.), Hindi/Bengali (।) and questions/exclamations
                                if (/[.?!।]\s/.test(sentenceBuffer) || sentenceBuffer.endsWith('\n')) {
                                    let sentenceToSpeak = sentenceBuffer.replace(/\[.*?\]/g, '').trim();
                                    if (sentenceToSpeak) {
                                        queueSpeech(sentenceToSpeak);
                                    }
                                    sentenceBuffer = ""; // Reset buffer for the next sentence
                                }
                            } catch(e) { }
                        }
                    }
                }

                // Speak any leftover words when the stream finishes
                let finalSentence = sentenceBuffer.replace(/\[.*?\]/g, '').trim();
                if (finalSentence) queueSpeech(finalSentence);

                // Save full response to memory
                conversationHistory.push({ role: "assistant", content: fullReplyTracker.replace(/\[.*?\]/g, '').trim() });

            } catch (error) {
                console.error("Stream error:", error);
            }
        }

        // ==========================================
        // VISUALIZATIONS
        // ==========================================
        function updateVisualBoard(keyword) {
            videoContainer.style.display = 'none';
            videoContainer.innerHTML = ''; 
            const formattedKeyword = encodeURIComponent(keyword);
            const newImageUrl = `https://source.unsplash.com/1920x1080/?${formattedKeyword}`;
            visualBoard.style.backgroundImage = `url('${newImageUrl}')`;
        }

        async function playYouTubeVideo(query) {
            if (YOUTUBE_API_KEY === "PASTE_YOUR_YOUTUBE_API_KEY_HERE") return;
            try {
                const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;
                const response = await fetch(searchUrl);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    const videoId = data.items[0].id.videoId;
                    visualBoard.style.backgroundImage = 'none';
                    videoContainer.style.display = 'block';
                    videoContainer.innerHTML = `
                        <iframe 
                            src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&loop=1&playlist=${videoId}" 
                            allow="autoplay; encrypted-media" 
                            allowfullscreen>
                        </iframe>`;
                }
            } catch (error) {}
        }

        // ==========================================
        // TEXT TO SPEECH QUEUEING
        // ==========================================
        function queueSpeech(text) {
            if (!isSessionLive || !text) return;

            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const currentLangCode = languageSelector.value; 
            
            let kenVoice = voices.find(v => v.lang === currentLangCode || v.lang.replace('_', '-') === currentLangCode);
            if (!kenVoice) {
                const baseLang = currentLangCode.split('-')[0];
                kenVoice = voices.find(v => v.lang.startsWith(baseLang));
            }
            if (kenVoice) utterance.voice = kenVoice;
            
            utterance.rate = 1.0;
            utterance.pitch = 0.9;
            
            // The browser automatically handles queuing multiple sentences in order!
            window.speechSynthesis.speak(utterance);
        }
        
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    </script>
</body>
</html>
