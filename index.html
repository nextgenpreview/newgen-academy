<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NewGen Academy | Ken Live</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #visual-board { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; transition: 0.5s; }
        #video-layer { position: absolute; width: 100%; height: 100%; z-index: 2; display: none; background: #000; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.7) 100%); }
        .top-bar { padding: 20px; display: flex; justify-content: space-between; pointer-events: auto; }
        .btn-mic { width: 80px; height: 80px; border-radius: 50%; border: none; background: #4CAF50; cursor: pointer; pointer-events: auto; margin-bottom: 30px; align-self: center; font-size: 30px; transition: 0.3s; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .btn-mic.active { background: #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0px rgba(244, 67, 54, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(244, 67, 54, 0); } 100% { transform: scale(1); } }
        select { background: rgba(255,255,255,0.1); color: white; border: 1px solid white; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="visual-board"></div>
    <div id="video-layer"></div>
    <div id="ui">
        <div class="top-bar">
            <h2>NewGen Academy</h2>
            <div>
                <select id="lang"><option value="en-IN">English</option><option value="bn-IN">Bengali</option><option value="hi-IN">Hindi</option></select>
                <select id="grade"><option>Grades 1-5</option><option>Grades 6-9</option><option>Grades 10-12</option><option>University</option></select>
            </div>
        </div>
        <button id="mic" class="btn-mic">🎤</button>
    </div>

    <script>
        const WORKER_URL = "https://newgen-brain.newpreviewgen.workers.dev/";
        const YT_KEY = "YOUR_YOUTUBE_API_KEY"; // Replace this!

        let live = false;
        let history = [];
        let recognition;
        const mic = document.getElementById('mic');
        const board = document.getElementById('visual-board');
        const vLayer = document.getElementById('video-layer');

        // Speech setup
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            
            recognition.onresult = (e) => {
                if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
                let final = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                }
                if (final.trim()) askKen(final.trim());
            };
            recognition.onend = () => { if(live) recognition.start(); };
        }

        mic.onclick = () => {
            live = !live;
            mic.classList.toggle('active', live);
            if(live) { 
                recognition.start(); 
                speak("Welcome to NewGen Academy. I am Ken. What shall we study?");
            } else { 
                recognition.stop(); 
                window.speechSynthesis.cancel();
            }
        };

        async function askKen(text) {
            history.push({ role: "user", content: text });
            const res = await fetch(WORKER_URL, {
                method: "POST",
                body: JSON.stringify({ messages: history.slice(-6), grade: document.getElementById('grade').value, language: document.getElementById('lang').selectedOptions[0].text })
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                
                // Cloudflare AI sends SSE 'data: {"response": "word"}'
                const lines = chunk.split('\n');
                for (let line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const data = JSON.parse(line.slice(6));
                            const word = data.response;
                            buffer += word;
                            fullText += word;

                            // Immediate Tag Processing
                            if (buffer.includes(']')) {
                                processTags(fullText);
                            }

                            // Sentence Processing for Speech
                            if (/[.?!।]\s/.test(buffer)) {
                                speak(buffer.replace(/\[.*?\]/g, ''));
                                buffer = "";
                            }
                        } catch(e){}
                    }
                }
            }
            history.push({ role: "assistant", content: fullText.replace(/\[.*?\]/g, '') });
        }

        function processTags(str) {
            const vid = str.match(/\[VIDEO:\s*(.*?)\]/i);
            const img = str.match(/\[VISUAL:\s*(.*?)\]/i);
            if (vid) playVideo(vid[1]);
            else if (img) showImage(img[1]);
        }

        function showImage(q) {
            vLayer.style.display = 'none';
            vLayer.innerHTML = '';
            board.style.backgroundImage = `url('https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&w=1920&q=80'), url('https://loremflickr.com/1920/1080/${encodeURIComponent(q)}')`;
        }

        async function playVideo(q) {
            if (YT_KEY === "YOUR_YOUTUBE_API_KEY") return showImage(q);
            const data = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}+science+lesson&type=video&key=${YT_KEY}`).then(r => r.json());
            if (data.items?.[0]) {
                vLayer.style.display = 'block';
                vLayer.innerHTML = `<iframe src="https://www.youtube.com/embed/${data.items[0].id.videoId}?autoplay=1&controls=0&mute=1" style="width:100%;height:100%"></iframe>`;
            }
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = document.getElementById('lang').value;
            u.rate = 1.1;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
