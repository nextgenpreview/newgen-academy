<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewGen Academy | Ken Live</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #visual-board { position: absolute; width: 100%; height: 100%; background-color: #111; background-size: cover; background-position: center; z-index: 1; transition: background-image 0.8s ease-in-out; }
        
        #video-layer { position: absolute; width: 100%; height: 100%; z-index: 2; display: none; background: #000; }
        #video-layer iframe { width: 100%; height: 100%; border: none; pointer-events: auto; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 15%, transparent 85%, rgba(0,0,0,0.8) 100%); }
        
        .top-bar { padding: 20px; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        h1 { margin: 0; font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        select { background: rgba(0,0,0,0.6); color: white; border: 2px solid white; padding: 10px 15px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; outline: none; }
        
        .bottom-controls { padding: 40px; display: flex; justify-content: center; pointer-events: auto; }
        
        /* Mic button starts green, becomes red when active */
        .btn-mic { width: 80px; height: 80px; border-radius: 50%; border: none; background: #4CAF50; color: white; font-size: 2rem; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
        .btn-mic.active { background: #f44336; box-shadow: 0 0 20px #f44336; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 
            0% { transform: scale(1); box-shadow: 0 0 0 0px rgba(244, 67, 54, 0.7); } 
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(244, 67, 54, 0); } 
            100% { transform: scale(1); } 
        }
    </style>
</head>
<body>

    <div id="visual-board" style="background-image: url('https://image.pollinations.ai/prompt/beautiful%20universe%20science?width=1920&height=1080&nologo=true');"></div>
    <div id="video-layer"></div>
    
    <div id="ui">
        <div class="top-bar">
            <h1>NewGen Academy</h1>
            <select id="grade-selector">
                <option value="Grades 1-5">Grades 1-5</option>
                <option value="Grades 6-9">Grades 6-9</option>
                <option value="Grades 10-12">Grades 10-12</option>
                <option value="Honors">Honors</option>
                <option value="Masters">Masters</option>
                <option value="Ph.D">Ph.D</option>
            </select>
        </div>
        <div class="bottom-controls">
            <button id="mic" class="btn-mic">🎤</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const WORKER_URL = "https://newgen-brain.newpreviewgen.workers.dev/";
        const YOUTUBE_API_KEY = "PASTE_YOUR_YOUTUBE_API_KEY_HERE"; 

        let isSessionLive = false;
        let recognition;
        let conversationHistory = []; 
        
        // Smart Listening Variables
        let speechBuffer = "";
        let speechTimeout = null;
        
        const micBtn = document.getElementById('mic');
        const gradeSelector = document.getElementById('grade-selector');
        const visualBoard = document.getElementById('visual-board');
        const videoLayer = document.getElementById('video-layer');

        // ==========================================
        // SMART SPEECH RECOGNITION (Listening & Waiting)
        // ==========================================
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true; 
            recognition.lang = 'en-IN'; // Best for picking up English, Hindi, and Bengali

            recognition.onresult = async (event) => {
                // 1. INSTANT INTERRUPTION
                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                }

                // 2. Clear timer as user is still talking
                clearTimeout(speechTimeout);

                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }

                if (finalTranscript.trim()) {
                    // Accumulate sentences
                    speechBuffer += " " + finalTranscript.trim();
                    
                    // 3. WAIT 2 SECONDS FOR USER TO FINISH
                    speechTimeout = setTimeout(async () => {
                        const fullQuestion = speechBuffer.trim();
                        if (fullQuestion) {
                            speechBuffer = ""; // Reset for next interaction
                            
                            // Immediately force visual update based on question
                            updateVisualBoard(fullQuestion + " science");
                            
                            // Send to AI
                            await askKen(fullQuestion);
                        }
                    }, 2000); 
                }
            };
            
            recognition.onend = () => { 
                // Auto-restart mic if session is live
                if (isSessionLive) recognition.start(); 
            };
        } else {
            alert("Please use Google Chrome for voice features.");
        }

        // ==========================================
        // LIVE SESSION CONTROL
        // ==========================================
        micBtn.addEventListener('click', () => {
            if (!isSessionLive) {
                isSessionLive = true;
                conversationHistory = []; 
                speechBuffer = "";
                micBtn.classList.add('active'); // Turns red
                recognition.start();
                speakOutLoud("Session started. Hi, I am Ken. Feel free to speak in English, Hindi, or Bengali. What shall we explore?");
            } else {
                isSessionLive = false;
                micBtn.classList.remove('active'); // Turns green
                recognition.stop();
                window.speechSynthesis.cancel();
                videoLayer.style.display = 'none';
                clearTimeout(speechTimeout);
            }
        });

        // ==========================================
        // AI BRAIN CONNECTION & PARSING
        // ==========================================
        async function askKen(message) {
            const gradeLevel = gradeSelector.value;
            conversationHistory.push({ role: "user", content: message });

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        grade: gradeLevel,
                        messages: conversationHistory
                    })
                });

                if (!response.ok) throw new Error("Server disconnected");

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let sentenceBuffer = "";
                let fullReplyTracker = "";
                let visualTriggered = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ') && !line.includes('[DONE]')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const word = data.response;
                                
                                sentenceBuffer += word;
                                fullReplyTracker += word;

                                // VISUALIZATION: Apply AI tags if present
                                if (!visualTriggered && sentenceBuffer.includes(']')) {
                                    visualTriggered = true;
                                    const videoMatch = fullReplyTracker.match(/\[VIDEO:\s*(.*?)\]/i);
                                    const visualMatch = fullReplyTracker.match(/\[VISUAL:\s*(.*?)\]/i);
                                    
                                    if (videoMatch) playYouTubeVideo(videoMatch[1] + " science explanation animation");
                                    else if (visualMatch) updateVisualBoard(visualMatch[1] + " science diagram");
                                }

                                // SPEAK FLUENTLY: Chunk at punctuation marks
                                if (/[.?!।]\s/.test(sentenceBuffer) || sentenceBuffer.endsWith('\n')) {
                                    let cleanText = sentenceBuffer.replace(/\[.*?\]/g, '').trim();
                                    if (cleanText) speakOutLoud(cleanText);
                                    sentenceBuffer = ""; 
                                }
                            } catch(e) { }
                        }
                    }
                }

                // Final cleanup of leftover words
                let finalSentence = sentenceBuffer.replace(/\[.*?\]/g, '').trim();
                if (finalSentence) speakOutLoud(finalSentence);

                conversationHistory.push({ role: "assistant", content: fullReplyTracker.replace(/\[.*?\]/g, '').trim() });

            } catch (error) {
                console.error("Connection error:", error);
                speakOutLoud("I am sorry, my network connection failed. Please ask that again.");
            }
        }

        // ==========================================
        // MANDATORY VISUALIZATIONS
        // ==========================================
        function updateVisualBoard(keyword) {
            videoLayer.style.display = 'none';
            videoLayer.innerHTML = ''; 
            
            // AI Image Generator: Guaranteed visuals, no key needed.
            const formattedKeyword = encodeURIComponent(keyword + " highly detailed 3d educational render");
            const newImageUrl = `https://image.pollinations.ai/prompt/${formattedKeyword}?width=1920&height=1080&nologo=true`;
            visualBoard.style.backgroundImage = `url('${newImageUrl}')`;
        }

        async function playYouTubeVideo(query) {
            if (YOUTUBE_API_KEY === "PASTE_YOUR_YOUTUBE_API_KEY_HERE" || !YOUTUBE_API_KEY) {
                // Fall back to instant image if no API key is provided
                updateVisualBoard(query); 
                return;
            }

            try {
                const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;
                const response = await fetch(searchUrl);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    const videoId = data.items[0].id.videoId;
                    visualBoard.style.backgroundImage = 'none';
                    videoLayer.style.display = 'block';
                    
                    videoLayer.innerHTML = `
                        <iframe 
                            src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&loop=1&playlist=${videoId}" 
                            allow="autoplay; encrypted-media" 
                            allowfullscreen>
                        </iframe>
                    `;
                } else {
                    updateVisualBoard(query); 
                }
            } catch (error) {
                updateVisualBoard(query); 
            }
        }

        // ==========================================
        // TEXT TO SPEECH (Auto-Language)
        // ==========================================
        function speakOutLoud(text) {
            if (!isSessionLive || !text) return;

            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            // Detect characters in text to choose the correct voice
            const hasBengali = /[\u0980-\u09FF]/.test(text);
            const hasHindi = /[\u0900-\u097F]/.test(text);
            
            let targetVoice;
            if (hasBengali) {
                targetVoice = voices.find(v => v.lang.includes('bn'));
            } else if (hasHindi) {
                targetVoice = voices.find(v => v.lang.includes('hi'));
            } else {
                targetVoice = voices.find(v => v.lang === 'en-GB' || v.lang === 'en-IN' || v.lang === 'en-US');
            }
            
            if (targetVoice) utterance.voice = targetVoice;
            utterance.rate = 1.0; 
            utterance.pitch = 0.9;
            
            window.speechSynthesis.speak(utterance);
        }
        
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
    </script>
</body>
</html>
