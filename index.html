<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewGen Academy | Ken the Science Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(135deg, #004d40, #fff9c4); font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #image-container, #youtube-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 2; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); }
        #dynamic-image { max-width: 80%; max-height: 80%; border-radius: 20px; box-shadow: 0 0 50px rgba(0, 191, 165, 0.5); object-fit: contain; }
        #youtube-iframe { width: 80%; height: 80%; border-radius: 20px; box-shadow: 0 0 50px rgba(220, 38, 38, 0.5); border: none; }
        .ui-layer { position: relative; z-index: 10; pointer-events: none; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; }
        .interactive { pointer-events: auto; }
        .floating-icon { position: absolute; color: rgba(142, 36, 170, 0.3); font-size: 2rem; animation: float 6s infinite ease-in-out; z-index: 0; }
        @keyframes float { 0% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(10deg); } 100% { transform: translateY(0) rotate(0deg); } }
        
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .state-listening { background-color: #ef4444; animation: pulse-red 2s infinite; }
        .state-thinking { background-color: #eab308; box-shadow: 0 0 20px rgba(234, 179, 8, 0.6); }
        .state-speaking { background-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
        .state-error { background-color: #991b1b; }
        .state-off { background-color: #22c55e; }
    </style>
</head>
<body>
    <div class="floating-icon" style="top: 20%; left: 10%; animation-delay: 0s;">★</div>
    <div class="floating-icon" style="top: 70%; left: 80%; animation-delay: 1s;">📖</div>
    <div class="floating-icon" style="top: 40%; left: 85%; animation-delay: 2s;">✏️</div>
    <div class="floating-icon" style="top: 80%; left: 20%; animation-delay: 3s;">🔬</div>

    <div id="canvas-container"></div>
    <div id="image-container"><img id="dynamic-image" src="" alt="AI Generated Science Visual"></div>
    <div id="youtube-container"><iframe id="youtube-iframe" src="" allowfullscreen></iframe></div>

    <div class="ui-layer p-6">
        <header class="interactive bg-[#0a0a0a] border-b-4 border-[#00bfa5] p-4 rounded-xl shadow-2xl flex justify-between items-center text-[#1e88e5]">
            <h1 class="text-2xl font-bold tracking-widest text-white">NEWGEN ACADEMY <span class="text-sm font-normal text-[#00bfa5]">| SCIENCE</span></h1>
            <div class="flex gap-4">
                <select id="grade-select" class="bg-gray-800 text-white border border-[#00bfa5] rounded p-2 outline-none">
                    <option value="1-5">Grades 1-5</option><option value="6-9">Grades 6-9</option><option value="10-12">Grades 10-12</option>
                </select>
                <select id="lang-select" class="bg-gray-800 text-white border border-[#00bfa5] rounded p-2 outline-none">
                    <option value="en-IN">English</option><option value="bn-IN">Bengali</option><option value="hi-IN">Hindi</option>
                </select>
            </div>
        </header>

        <div id="status-text" class="text-center text-white font-bold tracking-widest text-xl drop-shadow-md mt-4"></div> 
        <div id="live-transcript" class="text-center text-gray-300 italic mt-2 drop-shadow-md"></div>

        <div class="flex justify-end pb-4 pr-4">
            <button id="mic-btn" class="interactive state-off w-20 h-20 rounded-full flex items-center justify-center transition-all duration-300">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        // --- ✅ CLOUDFLARE WORKER URL ✅ ---
        const CLOUDFLARE_WORKER_URL = "https://newgen-brain.newpreviewgen.workers.dev";
        
        let scene, camera, renderer, currentObject;
        const canvasContainer = document.getElementById('canvas-container');
        const imageContainer = document.getElementById('image-container');
        const youtubeContainer = document.getElementById('youtube-container');
        const dynamicImage = document.getElementById('dynamic-image');
        const youtubeIframe = document.getElementById('youtube-iframe');
        const liveTranscriptUI = document.getElementById('live-transcript');
        
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            canvasContainer.appendChild(renderer.domElement);
            
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));
            camera.position.z = 5;
            animate3D();
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            if (currentObject) { currentObject.rotation.x += 0.01; currentObject.rotation.y += 0.01; }
            renderer.render(scene, camera);
        }

        function renderVisuals(aiData) {
            canvasContainer.style.display = 'none';
            imageContainer.style.display = 'none';
            youtubeContainer.style.display = 'none';

            if (aiData.visual_type === 'youtube') {
                youtubeContainer.style.display = 'flex';
                // Genius hack to instantly embed a YouTube search result
                youtubeIframe.src = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(aiData.visual_prompt)}`;
            } 
            else if (aiData.visual_type === 'image') {
                imageContainer.style.display = 'flex';
                dynamicImage.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(aiData.visual_prompt)}?width=1280&height=720&nologo=true`;
            } 
            else {
                canvasContainer.style.display = 'block';
                if (currentObject) scene.remove(currentObject);
                let geometry = new THREE.SphereGeometry(1.5, 32, 32);
                if (aiData.visual_prompt === 'cube') geometry = new THREE.BoxGeometry(2, 2, 2);
                if (aiData.visual_prompt === 'torus') geometry = new THREE.TorusGeometry(1.5, 0.4, 16, 100);
                currentObject = new THREE.Mesh(geometry, new THREE.MeshPhongMaterial({ color: "#00bfa5", shininess: 100 }));
                scene.add(currentObject);
            }
        }

        let sessionActive = false; 
        let kenIsBusy = false; 
        window.speechUtterances = []; 
        
        let fullTranscriptAccumulator = ""; // Stores your consecutive sentences
        let thoughtBufferTimer = null; // The timer that waits for you to finish breathing
        
        const micBtn = document.getElementById('mic-btn');
        const statusText = document.getElementById('status-text');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        let recognition = new SpeechRecognition();
        
        recognition.continuous = true; // Stay on forever
        recognition.interimResults = true; // Catch words as they are spoken

        function setUIState(state, customText = null) {
            micBtn.className = 'interactive w-20 h-20 rounded-full flex items-center justify-center transition-all duration-300';
            if (state === 'off') { micBtn.classList.add('state-off'); statusText.innerText = ""; liveTranscriptUI.innerText = ""; }
            if (state === 'listening') { micBtn.classList.add('state-listening'); statusText.innerText = "Listening..."; }
            if (state === 'thinking') { micBtn.classList.add('state-thinking'); statusText.innerText = "Ken is analyzing..."; liveTranscriptUI.innerText = ""; }
            if (state === 'speaking') { micBtn.classList.add('state-speaking'); statusText.innerText = "Ken is speaking..."; }
            if (state === 'error') { micBtn.classList.add('state-error'); statusText.innerText = customText || "Error Occurred"; }
        }

        function keepListening() {
            if (sessionActive && !kenIsBusy) {
                recognition.lang = document.getElementById('lang-select').value;
                try { recognition.start(); setUIState('listening'); } catch(e) { } 
            }
        }

        micBtn.addEventListener('click', () => {
            if (!sessionActive) {
                sessionActive = true;
                kenIsBusy = false;
                fullTranscriptAccumulator = "";
                keepListening();
            } else {
                sessionActive = false;
                kenIsBusy = false;
                setUIState('off');
                recognition.stop();
                synth.cancel(); 
                renderVisuals({visual_type: '3d'}); // Reset visuals
            }
        });

        // The Engine: Deep Listening & Interruption
        recognition.onresult = (event) => {
            if (!sessionActive || kenIsBusy) return;

            let interim = '';
            let justFinalized = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    justFinalized += event.results[i][0].transcript + " ";
                } else {
                    interim += event.results[i][0].transcript;
                }
            }

            // TRUE INTERRUPTION: If you make a sound while Ken is talking, shut him up instantly
            if ((justFinalized || interim).trim().length > 0 && synth.speaking) {
                synth.cancel();
            }

            fullTranscriptAccumulator += justFinalized;
            liveTranscriptUI.innerText = fullTranscriptAccumulator + interim; // Show you what it hears

            // THE THOUGHT BUFFER
            clearTimeout(thoughtBufferTimer); // Stop the clock! The user is still talking.

            if (fullTranscriptAccumulator.trim().length > 0) {
                // The user paused. Start a 1.5-second countdown.
                thoughtBufferTimer = setTimeout(async () => {
                    // Time's up! Send the complete consecutive sentences to Groq.
                    kenIsBusy = true;
                    setUIState('thinking');
                    
                    const textToSend = fullTranscriptAccumulator;
                    fullTranscriptAccumulator = ""; // Clear memory for the next conversation

                    try {
                        const langName = document.getElementById('lang-select').options[document.getElementById('lang-select').selectedIndex].text;
                        const response = await fetch(CLOUDFLARE_WORKER_URL, {
                            method: "POST", headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ text: textToSend, language: langName })
                        });
                        
                        if (!response.ok) throw new Error("Server Error");

                        const data = await response.json();
                        let rawResult = data.result;
                        let start = rawResult.indexOf('{');
                        let end = rawResult.lastIndexOf('}');
                        let cleanJsonString = rawResult.substring(start, end + 1).replace(/[\u0000-\u001F]+/g, " ");
                        const aiData = JSON.parse(cleanJsonString);
                        
                        renderVisuals(aiData);
                        
                        const utterance = new SpeechSynthesisUtterance(aiData.spoken_response);
                        utterance.lang = document.getElementById('lang-select').value;
                        window.speechUtterances.push(utterance); 
                        
                        utterance.onstart = () => { if (sessionActive) setUIState('speaking'); };
                        utterance.onend = () => { if (sessionActive) { kenIsBusy = false; keepListening(); } };
                        utterance.onerror = () => { if (sessionActive) { kenIsBusy = false; keepListening(); } };

                        synth.speak(utterance);

                    } catch (error) {
                        setUIState('error', "Connection issue");
                        setTimeout(() => { if (sessionActive) { kenIsBusy = false; keepListening(); } }, 3000);
                    }
                }, 1500); // Wait 1.5 seconds of silence before firing
            }
        };

        recognition.onend = () => { if (sessionActive && !kenIsBusy) setTimeout(keepListening, 100); };

        window.onload = init3D;
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
